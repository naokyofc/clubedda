<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUBE DDA</title>
<link rel="stylesheet" href="static/style.css">

<style>
/* Fonte moderna 3D sombreada */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111; /* fundo escuro */
    color: #fff;
}

/* Título 3D RGB */
.titulo-3d {
    font-family: 'Orbitron', sans-serif;
    font-size: 50px;
    text-align: center;
    margin: 20px 0;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rgbAnim 8s linear infinite;
    text-shadow: 2px 2px 5px #000;
}

@keyframes rgbAnim {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Borda RGB para áreas */
.area-rgb {
    border: 2px solid;
    border-image: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet) 1;
    border-radius: 10px;
    padding: 15px;
    margin: 10px auto;
}

/* Botões gerais */
button, a.botao-eventos, a.botao-ranking {
    cursor: pointer;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    margin: 5px;
    background: #222;
    color: #fff;
    transition: all 0.2s;
}

button:hover, a:hover {
    background: #555;
}

/* Divisão escondida */
.divisao-escondida {
    display: none;
    margin: 10px auto;
}

/* Menu de 3 barrinhas */
.menu-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 30px;
    height: 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 1000;
}

.menu-btn div {
    height: 4px;
    background: #fff;
    border-radius: 2px;
}

/* Menu lateral */
.menu-lateral {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: #111;
    transition: right 0.3s;
    z-index: 999;
    padding: 50px 20px;
}

.menu-lateral.open {
    right: 0;
}

.menu-lateral a {
    display: block;
    margin: 15px 0;
    color: #fff;
    text-decoration: none;
}
</style>
</head>
<body>

<h1 class="titulo-3d">CLUBE DDA</h1>

<!-- Área principal de eventos -->
<div class="botoes-secundarios">
    <a href="javascript:void(0)" class="botao-eventos" onclick="toggleEventos()">
        📅 Eventos <span id="contador" class="contador">0</span>
    </a>
    <a href="javascript:void(0)" class="botao-camps" onclick="toggleCamps()">🏆 Camps</a>
</div>

<!-- Área de Eventos -->
<div id="areaEventos" class="area-rgb" style="display:none;">
    <h2>📢 Avisos</h2>
    <div id="listaAvisos"></div>
</div>

<!-- Área de Camps -->
<div id="areaCamps" class="area-rgb" style="display:none;">
    <h2>🎖 Campeonatos Recentes</h2>
    <div id="listaCamps">Nenhum campeonato ainda.</div>
    <h3>🏆 Melhor Equipe</h3>
    <div id="melhorEquipe">Não definido</div>
</div>

<!-- Botão Admin -->
<button onclick="abrirLoginAdmin()" style="position:fixed; bottom:20px; left:20px; background:black; color:white; z-index:1000;">
    🔒
</button>

<!-- Menu lateral -->
<div class="menu-btn" onclick="abrirMenu()">
    <div></div><div></div><div></div>
</div>
<div class="menu-lateral" id="menuLateral">
    <a href="javascript:void(0)" onclick="toggleEventos()">Eventos</a>
    <a href="javascript:void(0)" onclick="toggleCamps()">Camps</a>
    <a href="#">Sorteios</a>
    <a href="#">Banidos</a>
</div>

<script>
// Dados persistentes
let avisos = JSON.parse(localStorage.getItem("avisos")) || [];
let melhorEquipe = localStorage.getItem("melhorEquipe") || "Não definido";
let contador = avisos.length;

// Funções de toggle
function toggleEventos(){
    let area = document.getElementById("areaEventos");
    area.style.display = (area.style.display === "block") ? "none" : "block";
    if(area.style.display === "block") contador = 0;
    atualizarContador();
    atualizarTela();
}

function toggleCamps(){
    let area = document.getElementById("areaCamps");
    area.style.display = (area.style.display === "block") ? "none" : "block";
}

// Atualiza telas
function atualizarTela(){
    let lista = document.getElementById("listaAvisos");
    lista.innerHTML = "";
    avisos.forEach((aviso, index) => {
        lista.innerHTML += `<div>📌 ${aviso} <button onclick="apagarAviso(${index})">❌</button></div>`;
    });
    document.getElementById("melhorEquipe").innerText = melhorEquipe;
}

// Apagar aviso
function apagarAviso(index){
    avisos.splice(index,1);
    localStorage.setItem("avisos", JSON.stringify(avisos));
    contador = avisos.length;
    atualizarTela();
    atualizarContador();
}

// Contador
function atualizarContador(){
    document.getElementById("contador").innerText = contador;
}

// Painel Admin
function abrirLoginAdmin(){
    let senha = prompt("Digite a senha:");
    const adminsEspeciais = ["MIMOZO DDA","LUIZDDA","DONOFIELDDA","ERRO404DDA"];
    let user = localStorage.getItem("usuarioAtual");
    
    if(adminsEspeciais.includes(user) || senha === "clubedda2026"){
        let aviso = prompt("Digite o aviso:");
        if(aviso){ 
            avisos.push(aviso);
            localStorage.setItem("avisos", JSON.stringify(avisos));
            contador = avisos.length;
            atualizarContador();
        }
        let equipe = prompt("Digite a melhor equipe:");
        if(equipe){
            melhorEquipe = equipe;
            localStorage.setItem("melhorEquipe", melhorEquipe);
        }
        alert("Alterações aplicadas!");
    } else {
        alert("Senha incorreta!");
    }
}

// Menu lateral
function abrirMenu(){
    let menu = document.getElementById("menuLateral");
    menu.classList.toggle("open");
}

// Login de usuário
let usuario = localStorage.getItem("usuarioAtual");
if(!usuario){
    usuario = prompt("Digite seu login:");
    if(usuario) {
        localStorage.setItem("usuarioAtual", usuario);
        let nick = prompt("Digite seu Nick no jogo:");
        localStorage.setItem(usuario+"_nick", nick);
    }
}

// Inicialização
document.addEventListener("DOMContentLoaded", ()=>{
    atualizarTela();
    atualizarContador();
});
</script>

</body>
</html>
